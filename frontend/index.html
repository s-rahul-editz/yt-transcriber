<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcriber</title>
<style>
  :root {
    --bg: #0f1210;
    --panel: #171b18;
    --line: #2a2f2b;
    --text: #e7ece8;
    --muted: #8a9389;
    --accent: #5ee6a0;
    --mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .eyebrow {
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 6px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type=text] {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 14px;
    border-radius: 4px;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #0f1210;
    border: none;
    padding: 12px 20px;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .status {
    font-size: 13px;
    color: var(--muted);
    margin: 16px 0;
    min-height: 18px;
  }
  .status.active::before {
    content: "● ";
    color: var(--accent);
  }

  .meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 10px 0;
    margin-bottom: 16px;
  }
  .meta span b { color: var(--text); }

  .segment {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    line-height: 1.5;
  }
  .segment .ts {
    color: var(--accent);
    font-size: 12px;
    white-space: nowrap;
    padding-top: 2px;
    width: 52px;
  }

  .actions { display: flex; gap: 8px; margin-top: 16px; }
  .actions button { background: transparent; border: 1px solid var(--line); color: var(--text); font-weight: 400; }

  #results { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Personal tool</div>
  <h1>Transcriber</h1>
  <div class="sub">Paste a YouTube link. Pulls captions if they exist, transcribes the audio if they don't.</div>

  <div class="row">
    <input id="url" type="text" placeholder="https://youtube.com/watch?v=..." />
    <button id="go">Transcribe</button>
  </div>

  <div id="status" class="status"></div>

  <div id="results">
    <div class="meta">
      <span>Method <b id="methodUsed">—</b></span>
      <span>Language <b id="lang">—</b></span>
      <span>Segments <b id="segCount">—</b></span>
    </div>
    <div id="segments"></div>
    <div class="actions">
      <button id="downloadTxt">Download .txt</button>
      <button id="downloadSrt">Download .srt</button>
    </div>
  </div>
</div>

<script>
  const API_BASE = "http://localhost:8000";

  const urlInput = document.getElementById("url");
  const goBtn = document.getElementById("go");
  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");
  const segmentsEl = document.getElementById("segments");

  let lastResult = null;

  function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, "0")}`;
  }

  function srtTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    const ms = Math.floor((sec % 1) * 1000);
    return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")},${ms.toString().padStart(3,"0")}`;
  }

  async function transcribe() {
    const url = urlInput.value.trim();
    if (!url) return;

    goBtn.disabled = true;
    resultsEl.style.display = "none";
    statusEl.className = "status active";
    statusEl.textContent = "Checking for captions, falling back to audio transcription if needed. This can take a minute...";

    try {
      const res = await fetch(`${API_BASE}/transcribe`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Transcription failed");
      }

      const data = await res.json();
      lastResult = data;
      renderResult(data);
      statusEl.className = "status";
      statusEl.textContent = "Done.";
    } catch (e) {
      statusEl.className = "status";
      statusEl.textContent = `Error: ${e.message}`;
    } finally {
      goBtn.disabled = false;
    }
  }

  function renderResult(data) {
    document.getElementById("methodUsed").textContent = data.method_used;
    document.getElementById("lang").textContent = data.language;
    document.getElementById("segCount").textContent = data.segments.length;

    segmentsEl.innerHTML = "";
    for (const seg of data.segments) {
      const row = document.createElement("div");
      row.className = "segment";
      row.innerHTML = `<span class="ts">${fmtTime(seg.start)}</span><span>${seg.text}</span>`;
      segmentsEl.appendChild(row);
    }
    resultsEl.style.display = "block";
  }

  function download(filename, content) {
    const blob = new Blob([content], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
  }

  document.getElementById("downloadTxt").addEventListener("click", () => {
    if (!lastResult) return;
    const text = lastResult.segments.map(s => s.text).join(" ");
    download(`${lastResult.video_id}.txt`, text);
  });

  document.getElementById("downloadSrt").addEventListener("click", () => {
    if (!lastResult) return;
    let srt = "";
    lastResult.segments.forEach((s, i) => {
      srt += `${i + 1}\n${srtTime(s.start)} --> ${srtTime(s.end)}\n${s.text}\n\n`;
    });
    download(`${lastResult.video_id}.srt`, srt);
  });

  goBtn.addEventListener("click", transcribe);
  urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") transcribe(); });
</script>
</body>
</html>
